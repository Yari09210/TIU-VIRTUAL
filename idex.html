<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIU VIRTUAL</title>
    <link rel="stylesheet" href="css/TIU.css">
</head>
<body>

    <!-- Contenedor principal (Celular) -->
<div class="app-container">
    
    <!-- Capa de animación para las nubes infinitas -->
    <div class="nubes-background"></div>
    
    <!-- Encabezado de la aplicación -->
    <header class="header">
        <button class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#e1251b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        <h2 class="header-title">TIU VIRTUAL</h2>
    </header>

    <!-- Bloque del Reloj y Fecha -->
    <div class="clock-section">
        <div class="clock" id="hora">01:19:30</div>
        <div class="date" id="fecha">Miércoles, 22 Jul 2026</div>
    </div>

    <!-- Bloque del Carnet con Foto Superpuesta -->
    <div class="id-card-wrapper">
        <div class="profile-photo">
            <img src="img/Sebas.jpeg" alt="Foto de perfil">
        </div>
        
        <div class="card-content">
            <h1 class="student-name">SEBASTIAN ALESSANDRO F*** B***</h1>
            
            <div class="info-group">
                <p class="label">Código de alumno:</p>
                <p class="value">U20263B450</p>
            </div>

            <div class="info-group">
                <p class="label">ID Banner:</p>
                <p class="value">N05193562</p>
            </div>

            <h2 class="career-title">INGENIERÍA DE SISTEMAS EPE</h2>
            <div class="location">📍 Campus Monterrico</div>
        </div>
    </div>

</div>

    <script src="js/TIU.js"></script>
</body>
</html>
